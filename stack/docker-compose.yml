services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY is required}
      AIOHTTP_CLIENT_TIMEOUT: "900"

      # IONOS AI Model Hub via OpenAI-compatible API
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: ${IONOS_OPENAI_BASE_URL:-https://openai.inference.de-txl.ionos.com/v1}
      OPENAI_API_KEY: ${IONOS_API_KEY:?IONOS_API_KEY is required}
      TASK_MODEL_EXTERNAL: ${IONOS_CHAT_MODEL_DEFAULT:-mistralai/Mistral-Small-24B-Instruct}
      IONOS_CHAT_MODEL_DEFAULT: ${IONOS_CHAT_MODEL_DEFAULT:-mistralai/Mistral-Small-24B-Instruct}
      IONOS_CHAT_MODEL_REASONING: ${IONOS_CHAT_MODEL_REASONING:-openai/gpt-oss-120b}

      # RAG embeddings use IONOS BGE-M3. Existing Qdrant/Open WebUI vectors must be reindexed.
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: ${IONOS_OPENAI_BASE_URL:-https://openai.inference.de-txl.ionos.com/v1}
      RAG_OPENAI_API_KEY: ${IONOS_API_KEY:?IONOS_API_KEY is required}
      RAG_EMBEDDING_MODEL: ${IONOS_EMBEDDING_MODEL:-BAAI/bge-m3}
      RAG_EMBEDDING_BATCH_SIZE: "1"
      RAG_EMBEDDING_OPENAI_BATCH_SIZE: "1"
      # Chat uploads are processed for direct file context/file tools, but not auto-indexed into OpenWebUI RAG.
      # KAHLE-Vinci uses kb-sync + Qdrant for managed knowledgebases; this avoids IONOS embedding rate limits on every upload.
      BYPASS_EMBEDDING_AND_RETRIEVAL: "True"
      VECTOR_DB: qdrant
      QDRANT_URI: http://qdrant:6333

      # KAHLE-Vinci Tool-Haertung
      KV_CURRENT_YEAR: "2026"
      KV_STRICT_NOTICE_ONLY: "1"
      KV_FIX_YEAR_IN_QUERY: "0"

      N8N_SAFE_WEBSEARCH_WEBHOOK_URL: ${N8N_SAFE_WEBSEARCH_WEBHOOK_URL:-http://n8n:5678/webhook/safe-websearch/h576htdr-5b9t-89r8-61wx-8a50bh988m6a}
      N8N_SAFE_WEBSEARCH_API_KEY: ${N8N_SAFE_WEBSEARCH_API_KEY:-}
      N8N_SAFE_WEBSEARCH_TIMEOUT: ${N8N_SAFE_WEBSEARCH_TIMEOUT:-50}
      OWUI_FILE_PROXY_URL: http://owui-file-proxy:8091
      OWUI_FILE_PROXY_API_KEY: ${OWUI_FILE_PROXY_API_KEY:?OWUI_FILE_PROXY_API_KEY is required}
      DEFAULT_PROMPT_SUGGESTIONS: >-
        [
          {"title":["Kundenmail formulieren","freundlich, klar, autohausnah"],"content":"Formuliere eine freundliche Antwort an einen Kunden. Nutze förmliches Sie, bleibe verbindlich und verwende Platzhalter für Namen, Standort und Kontaktdaten. Anliegen: "},
          {"title":["Servicefall zusammenfassen","für Werkstatt oder Serviceleitung"],"content":"Fasse den folgenden Service- oder Werkstattfall intern zusammen: Ausgangslage, Kundenanliegen, bisherige Schritte, offener Punkt und empfohlener nächster Schritt. Text: "},
          {"title":["Fahrzeug argumentieren","Verkaufsgespräch vorbereiten"],"content":"Erstelle eine sachliche Argumentationshilfe für ein Verkaufsgespräch. Berücksichtige Kundennutzen, Einwände, passende Fragen und eine kurze Abschlussformulierung. Fahrzeug/Kontext: "},
          {"title":["Internes Wissen prüfen","Richtlinie, Prozess oder Standort"],"content":"Prüfe unser internes KAHLE-Wissen zu folgendem Thema und antworte nur auf Basis der internen Informationen: "},
          {"title":["Text verbessern","professionell und verständlich"],"content":"Überarbeite den folgenden Text so, dass er klar, professionell und gut verständlich ist. Erhalte die Aussage, entferne Füllwörter und formuliere passend für den Autohauskontext. Text: "},
          {"title":["Aufgabenliste erstellen","Prioritäten und nächste Schritte"],"content":"Erstelle aus dem folgenden Anliegen eine kurze Aufgabenliste mit Priorität, Fälligkeit falls erkennbar und konkretem nächsten Schritt. Anliegen: "}
        ]

      TOOLS_FUNCTION_CALLING_PROMPT_TEMPLATE: |-
       Available Tools: {{TOOLS}}
       Return ONLY valid JSON:
       {"tool_calls":[{"name":"<tool>","parameters":{...}}]}
       RULES:
       - For safe_webcaller/safe_websearch, set query to a concise search-engine query, not to the full conversational user sentence. Include main entity, aspect, region/language, and timeframe when present.
       - For current/news/latest web searches, include 2026 or the explicit date/range from the user. Do not add unrelated years.
       - Do not include chat filler in search queries, e.g. "bitte", "recherchiere", "kannst du".
       - Set lang="de-DE" and maxResults=5 when present.
       - Current year: 2026 (Europe/Berlin). Do not add any year unless the user wrote it.
       - For file editing/conversion tasks, prefer *_save tools from the proxy.
       - If the user asks to edit/convert/summarize an uploaded/attached file, perform one matching *_save tool call ONLY when exact filename(s) are known from the current message context.
       - Exact filenames are listed in the user query block under: "Attached files in this message (use exact names for any file tool call):"
       - Use those names verbatim for file_path/file_paths.
       - If the user asks for "the attached file" and exactly one attached filename is present in the current message context, use that filename directly; do not ask for confirmation.
       - If exact filename(s) are missing/ambiguous, return {"tool_calls":[]} and ask one short clarification question for the exact filename(s).
       - Never call /files/download as a tool; it is only for user-facing links.
       - For file tools, require exact uploaded filename(s) in file_path/file_paths.
       - Never prefix with "uploads/".
       - Never use wildcards, placeholders, or "latest" for file_path/file_paths.
       - Never invent or guess filenames; use only real uploaded filenames from context.
       - Routing hints for attached files:
       - convert PDF/DOCX/TXT/MD/XLSX/CSV -> markdown: file_to_md_save
       - convert PDF/DOCX/TXT/MD/XLSX/CSV -> Word/DOCX: file_to_docx_save
       - generated research/text -> markdown/txt/csv download: text_create_save
       - generated research/text -> Word/DOCX download: docx_create_save
       - generated research/text -> PDF download: pdf_create_save
       - generated research/text -> PowerPoint/PPTX download: pptx_create_save
       - Creating a new file from research/result/answer/history never requires an uploaded filename.
       - If one user request combines research/web/RAG AND a downloadable PDF/DOCX/PPTX/MD output, prefer kahle_workflow_execute once and set output_format to "pdf", "docx", "pptx", or "md". Do not split this into separate search and file tools.
       - For docx_create_save/pdf_create_save/pptx_create_save/text_create_save, parameters MUST include filename and content. Never call these tools with {}.
       - If the user asks to create a file "from the result", "from this", or "from the previous answer", set content to the full relevant ASSISTANT message from History.
       - If no relevant generated content exists in History, return {"tool_calls":[]} and ask what content should be put into the file.
       - DOCX -> PDF: docx_to_pdf_save
       - DOCX replace text: docx_replace_one_save
       - DOCX delete last paragraphs: docx_delete_last_paragraphs_save
       - PDF remove pages: pdf_remove_pages_save
       - PDF merge: pdf_merge_save
       - XLSX cell updates: xlsx_update_cells_save
       - For xlsx_update_cells_save, updates MUST NOT be empty.
       - For large XLSX ranges, use a compact update object instead of thousands of single cells, e.g. {"range":"A2:A500","generator":"random_money","min":1000,"max":100000,"decimals":2}
       - multi-file master context markdown: bundle_to_md_save
       - If a tool result contains download_url, do not reconstruct file content; return only download_url and metadata.
       If no tool: {"tool_calls":[]}

      ENABLE_DIRECT_CONNECTIONS: "True"
      TOOL_SERVER_CONNECTIONS: >-
        [{"type":"openapi","url":"http://owui-file-proxy:8091","spec_type":"url","spec":"","path":"openapi.json","auth_type":"bearer","key":"${OWUI_FILE_PROXY_API_KEY}","config":{"enable":true},"info":{"id":"doc-worker","name":"Document Worker","description":"Local DOCX/XLSX/PDF file editing tools"}}]
      USER_PERMISSIONS_FEATURES_DIRECT_TOOL_SERVERS: "True"
      OWUI_APPEND_ATTACHED_FILE_NAMES_TO_USER_MESSAGE: "True"
      KAHLE_TASKS_DB_PATH: /app/backend/data/kahle_vinci_tasks.db
      KB_ROOT: /knowledgebases
      KB_STATE_PATH: /kb-sync-state/kb-sync-state.json
      KB_SYNC_COLLECTIONS: kahleallgemein,kahlekontext,kahlerichtlinien
    volumes:
      - open-webui:/app/backend/data
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/knowledgebases:/knowledgebases:ro"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/kb-sync-state:/kb-sync-state:ro"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/stack/open-webui-overrides/open_webui/utils/middleware.py:/app/backend/open_webui/utils/middleware.py:ro"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/stack/open-webui-overrides/open_webui/utils/misc.py:/app/backend/open_webui/utils/misc.py:ro"
    depends_on:
      document-worker:
        condition: service_healthy
      owui-file-proxy:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - appnet

  owui-file-proxy:
    image: stack-owui-file-proxy
    build:
      context: ./owui-file-proxy
      dockerfile: Dockerfile
    container_name: owui-file-proxy
    restart: unless-stopped
    environment:
      OWUI_UPLOAD_DIR: /app/backend/data/uploads
      DOC_WORKER_URL: http://document-worker:8090
      TOOL_API_KEY: ${OWUI_FILE_PROXY_API_KEY:?OWUI_FILE_PROXY_API_KEY is required}
      WORKER_API_KEY: ${DOC_WORKER_API_KEY:?DOC_WORKER_API_KEY is required}
      REQUIRE_TOOL_API_KEY: "true"
      REQUIRE_EXACT_FILE_PATH: "true"
      DISALLOW_WILDCARDS: "true"
      OWUI_OUTPUT_SUBDIR: edited
      OWUI_DB_PATH: /app/backend/data/webui.db
      OWUI_LOG_CLEANUP_REPORT_PATH: /retention-reports/openwebui_log_cleanup_report.json
      OWUI_LOG_CLEANUP_STALE_HOURS: "36"
      FILE_LINK_SECRET: ${FILE_LINK_SECRET:?FILE_LINK_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8091}
      KAHLE_ASSETS_ROOT: /assets
      KAHLE_DOCX_TEMPLATE: /assets/templates/docx/KAHLE-DOCX-VORLAGE.docx
      KAHLE_PDF_TEMPLATE: /assets/templates/pdf/KAHLE-PDF-VORLAGE.pdf
      KAHLE_PPTX_TEMPLATE: /assets/templates/pptx/KAHLE-PPTX-Vorlage.pptx
      KAHLE_BRAND_CONFIG: /assets/brand/colors/kahle-brand.json
      KAHLE_LOGO_PRIMARY: /assets/brand/logos/Logo_Kahle_Gruppe_positiv.png
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - open-webui:/app/backend/data
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/assets:/assets:ro"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/stack/retention-reports:/retention-reports:ro"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=5).getcode()==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      document-worker:
        condition: service_healthy
    networks:
      - appnet

  document-worker:
    build:
      context: ./document-worker
      dockerfile: Dockerfile
    container_name: document-worker
    restart: unless-stopped
    environment:
      STORAGE_DIR: /data
      TTL_HOURS: "24"
      MAX_FILE_MB: "30"
      TOOL_API_KEY: ${DOC_WORKER_API_KEY:?DOC_WORKER_API_KEY is required}
    volumes:
      - document_worker_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).getcode()==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - appnet

  n8n:
    image: n8nio/n8n:2.16.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      GENERIC_TIMEZONE: Europe/Berlin
      N8N_HOST: localhost
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: "false"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      N8N_RESTRICT_FILE_ACCESS_TO: /home/node/.n8n-files/knowledgebases
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: none
      EXECUTIONS_DATA_SAVE_ON_ERROR: none
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "50000"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      IONOS_OPENAI_BASE_URL: ${IONOS_OPENAI_BASE_URL:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_API_KEY: ${IONOS_API_KEY:?IONOS_API_KEY is required}
      IONOS_CHAT_MODEL_DEFAULT: ${IONOS_CHAT_MODEL_DEFAULT:-mistralai/Mistral-Small-24B-Instruct}
      IONOS_CHAT_MODEL_REASONING: ${IONOS_CHAT_MODEL_REASONING:-openai/gpt-oss-120b}
      IONOS_EMBEDDING_MODEL: ${IONOS_EMBEDDING_MODEL:-BAAI/bge-m3}
      OWUI_FILE_PROXY_API_KEY: ${OWUI_FILE_PROXY_API_KEY:?OWUI_FILE_PROXY_API_KEY is required}
    volumes:
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/n8n:/home/node/.n8n"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/knowledgebases:/home/node/.n8n-files/knowledgebases:ro"
      - open-webui:/mnt/open-webui-data
      - document_worker_data:/mnt/document-worker-data
    networks:
      - appnet

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - appnet

  kb-sync:
    build:
      context: ./kb-sync
      dockerfile: Dockerfile
    container_name: kb-sync
    restart: unless-stopped
    environment:
      KB_ROOT: /knowledgebases
      KB_STATE_PATH: /state/kb-sync-state.json
      QDRANT_URL: http://qdrant:6333
      IONOS_OPENAI_BASE_URL: ${IONOS_OPENAI_BASE_URL:-https://openai.inference.de-txl.ionos.com/v1}
      IONOS_API_KEY: ${IONOS_API_KEY:?IONOS_API_KEY is required}
      IONOS_EMBEDDING_MODEL: ${IONOS_EMBEDDING_MODEL:-BAAI/bge-m3}
      KB_SYNC_COLLECTIONS: kahleallgemein,kahlekontext,kahlerichtlinien
      KB_SYNC_DEBOUNCE_SECONDS: "2"
      KB_SYNC_RECONCILE_INTERVAL_SECONDS: "300"
    volumes:
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/knowledgebases:/knowledgebases:ro"
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/kb-sync-state:/state"
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - appnet

  searxng:
    image: searxng/searxng:2026.4.13-ee66b070a
    container_name: searxng
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - "${KAHLE_ROOT:?KAHLE_ROOT is required}/searxng:/etc/searxng"
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY is required}
      GRANIAN_HOST: 0.0.0.0
      GRANIAN_PORT: "8080"
      BIND_ADDRESS: 0.0.0.0:8080
    networks:
      - appnet

volumes:
  open-webui:
    name: open-webui
  qdrant_data: {}
  document_worker_data: {}

networks:
  appnet:
    driver: bridge
